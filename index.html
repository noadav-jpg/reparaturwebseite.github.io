<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startseite - Wilhelm-Gymnasium Braunschweig</title>
    <style>
        *{
            font-family:Arial, Helvetica, sans-serif;
            border-radius:20px;
        }
        .header{
            background-color:#aaccff;
            padding:60px;
            margin:40px;
            box-shadow: 0px 0px 20px 5px rgba(0, 0, 0, 0.20);
            text-align:center;
            font-size:36px;
        }
        .article{
            background-color:#cce0ff;
            padding:20px;
            margin:20px;
            box-shadow: 0px 0px 20px 5px rgba(0, 0, 0, 0.20);
        }
        .form{
            background-color:#e6f0ff;
            display:flex;
            flex-direction:column;
            gap:10px;
            padding:20px;
            margin:20px;
            line-height: 1.2;
        }
        .checkbox-container{
            display:flex;
        }
        .detailstextbox{
            height:100px;
            text-align:left;
        }
    </style>
</head>
<body>
    <header class="header">
        Wilhelm-Gymnasium<img src="https://wilhelm-gym.de/wp-content/uploads/2018/06/wglogo_transparent.png" alt="https://wilhelm-gym.de/wp-content/uploads/2018/06/wglogo_transparent.png" style="float:none;width:120px;height:40px;" class="transparent">
    </header>
    <div>
        <section class="section">
            <h2 style="text-align:center;">Reparatur</h2>
            <p style="text-align:center;"><small>*Pflichtfeld</small></p>
                <article class="article">
                    <form class="form">
                        <label for="gebaeudeetraum">Gebäude und Raum*:</label>
                        <select name="gebaeudeetraum" id="gebaeudeetraum" required>
                            <option value="" disabled selected>Raum auswählen</option>
                            <option value="0">-A154</option>
                            <option value="1">-A157</option>
                            <option value="2">-A158</option>
                            <option value="3">A001</option>
                            <option value="4">A010</option>
                            <option value="5">A024</option>
                            <option value="6">A025</option>
                            <option value="7">A026</option>
                            <option value="8">A053</option>
                            <option value="9">A054</option>
                            <option value="10">A058</option>
                            <option value="11">A111</option>
                            <option value="12">A113</option>
                            <option value="13">A114</option>
                            <option value="14">A124</option>
                            <option value="15">A125</option>
                            <option value="16">A126</option>
                            <option value="17">A132</option>
                            <option value="18">A133</option>
                            <option value="19">A136</option>
                            <option value="20">A137</option>
                            <option value="21">A153</option>
                            <option value="22">A154</option>
                            <option value="23">A155</option>
                            <option value="24">A158</option>
                            <option value="25">A211</option>
                            <option value="26">A213</option>
                            <option value="27">A214</option>
                            <option value="28">A216</option>
                            <option value="29">A224</option>
                            <option value="30">A226</option>
                            <option value="31">A232</option>
                            <option value="32">A233</option>
                            <option value="33">A236</option>
                            <option value="34">A237</option>
                            <option value="35">B022</option>
                            <option value="36">B023</option>
                            <option value="37">B110</option>
                            <option value="38">B111</option>
                            <option value="39">B114</option>
                            <option value="40">B118</option>
                            <option value="41">B119</option>
                            <option value="42">B120</option>
                            <option value="43">B130</option>
                            <option value="44">B210</option>
                            <option value="45">B211</option>
                            <option value="46">B218</option>
                            <option value="47">B219</option>
                            <option value="48">B220</option>
                            <option value="49">B221</option>
                            <option value="50">B230</option>
                            <option value="51">C001</option> 
                            <option value="52">D001</option>
                            <option value="53">D004</option>
                            <option value="54">D005</option>
                            <option value="55">D006</option>
                            <option value="56">F001</option>
                            <option value="57">F002</option>
                            <option value="58">F003</option>
                            <option value="59">F004</option>
                        </select>
                        <p>Abkürzungen für die jeweilige Gebäude:</p>
                        <ul>
                            <li>A: Hauptgebäude</li>
                            <li>B: Außenstelle</li>
                            <li>C: Sporthalle - Außenstelle</li>
                            <li>D: Container - Hauptstelle</li>
                            <li>F: Container - Außenstelle</li>
                        </ul>
                    </form>
                    <hr>
                    <form class="form">
                        <p text-align="center">Gegenstand*:</p>
                        <div class="checkbox-container">
                            <label for="objekt1">Beamer</label><br>
                            <input type="checkbox" id="objekt1" name="objekt1" value="Beamer">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt2">Boden</label><br>
                            <input type="checkbox" id="objekt2" name="objekt2" value="Boden">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt3">Decke</label><br>
                            <input type="checkbox" id="objekt3" name="objekt3" value="Decke">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt4">Fenster</label><br>
                            <input type="checkbox" id="objekt4" name="objekt4" value="Fenster">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt5">Papiertuchspender</label><br>
                            <input type="checkbox" id="objekt5" name="objekt5" value="Papiertuchspender">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt6">Heizung</label><br>
                            <input type="checkbox" id="objekt6" name="objekt6" value="Heizung">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt7">Kabel (wie viele?)</label><br>
                            <input type="number" id="objekt7" name="objekt7" value="Kabel" min="0">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt8">Lampe (wie viele?)</label><br>
                            <input type="number" id="objekt8" name="objekt8" value="Lampe" min="0">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt9">Lautsprecher</label><br>
                            <input type="checkbox" id="objekt9" name="objekt9" value="Lautsprecher">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt10">Mülleimer</label><br>
                            <input type="checkbox" id="objekt10" name="objekt10" value="Mülleimer">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt11">Steckdose (wie viele?)</label><br>
                            <input type="number" id="objekt11" name="objekt11" value="Steckdose" min="0">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt12">Seifenspender</label><br>
                            <input type="checkbox" id="objekt12" name="objekt12" value="Seifenspender">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt13">Smartboard</label><br>
                            <input type="checkbox" id="objekt13" name="objekt13" value="Smartboard">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt14">Stuhl (wie viele?)</label><br>
                            <input type="number" id="objekt14" name="objekt14" value="Stuhl" min="0">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt15">Tafel</label><br>
                            <input type="checkbox" id="objekt15" name="objekt15" value="Tafel" min="0">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt16">Tisch (wie viele?)</label><br>
                            <input type="number" id="objekt16" name="objekt16" value="Tisch" min="0">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt17">Tür</label><br>
                            <input type="checkbox" id="objekt17" name="objekt17" value="Tür">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt18">Uhr</label><br>
                            <input type="checkbox" id="objekt18" name="objekt18" value="Uhr">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt19">Vorhang</label><br>
                            <input type="checkbox" id="objekt19" name="objekt19" value="Vorhang">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt20">Wand</label><br>
                            <input type="checkbox" id="objekt20" name="objekt20" value="Wand">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt21">Waschbecken</label><br>
                            <input type="checkbox" id="objekt21" name="objekt21" value="Waschbecken">
                        </div>
                        <div class="checkbox-container">
                            <label for="objekt22">Whiteboard</label><br>
                            <input type="checkbox" id="objekt22" name="objekt22" value="Whiteboard">
                        </div>
                    </form>
                    <hr>
                    <form class="form">
                        <p>Problem*:</p>
                        <div class="checkbox-container">
                            <label for="idproblem1">fehlend</label><br>
                            <input type="radio" id="idproblem1" name="problem" value="fehlend">
                        </div>
                        <div class="checkbox-container">
                            <label for="idproblem2">kaputt</label><br>
                            <input type="radio" id="idproblem2" name="problem" value="kaputt">
                        </div>
                        <div class="checkbox-container">
                            <label for="idproblem3">sonstiges</label><br>
                            <input type="radio" id="idproblem3" name="problem" value="sonstiges"><br>
                            <input type="text" id="idproblem3text" name="problem3text">
                        </div>
                    </form>
                    <hr>
                    <form class="form">
                        <label for="details">Details:</label>
                        <input type="text" id="details" name="details" placeholder="Details eingeben" size="25" class="detailstextbox">
                    </form>
                    <hr>
                    <form class="form">
                        <label for="dringlichkeit">Dringlichkeit (1-10)*:</label>
                        <input type="range" id="dringlichkeit" name="dringlichkeit" min="1" max="10" step="1" value="1" required>
                    </form>
                    <hr>
                    <form class="form">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" placeholder="Name eingeben">
                    </form>
                    <hr>
                    <input type="submit" value="Reparatur melden">
                </article>
        </section>
    </div>
</body>
</html>
