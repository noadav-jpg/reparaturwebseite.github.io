<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reparaturwebseite - Wilhelm-Gymnasium Braunschweig</title>
    <style>
        *{
            font-family:"Ebrima", sans-serif;
            border-radius:20px;
        }
        .header{
            background-color:#aaccff;
            padding:60px;
            margin:40px;
            box-shadow: 0px 0px 20px 5px rgba(0, 0, 0, 0.20);
            text-align:center;
            font-size:36px;
        }
        .article{
            background-color:#cce0ff;
            padding:20px;
            margin:20px;
            box-shadow: 0px 0px 20px 5px rgba(0, 0, 0, 0.20);
        }
        .form{
            background-color:#e6f0ff;
            display:flex;
            flex-direction:column;
            gap:10px;
            padding:20px;
            margin:20px;
            line-height: 1.2;
        }
        .checkbox-container{
            display:flex;
        }
        .detailstextbox{
            text-align:left;
        }
    </style>
</head>
<body>
    <header class="header">
        <strong>Wilhelm-Gymnasium</strong>
        <img src="https://wilhelm-gym.de/wp-content/uploads/2018/06/wglogo_transparent.png" alt="https://wilhelm-gym.de/wp-content/uploads/2018/06/wglogo_transparent.png" style="float:none;width:240px;height:80px;" class="transparent">
    </header>
    <div>
        <section class="section">
                <article class="article">
                    <h2 style="text-align:center;">Reparatur</h2>
                    <p style="text-align:center;"><small>*Pflichtfeld</small></p>
                        <form class="form" action="/mail" method="post">
                            <label for="gebaeudeetraum">Gebäude und Raum*:</label>
                            <select name="gebaeudeetraum" id="gebaeudeetraum" required>
                                <option value="" disabled selected>Raum auswählen</option>
                                <option value="-A154">-A154</option>
                                <option value="-A157">-A157</option>
                                <option value="-A158">-A158</option>
                                <option value="A001">A001</option>
                                <option value="A010">A010</option>
                                <option value="A024">A024</option>
                                <option value="A025">A025</option>
                                <option value="A026">A026</option>
                                <option value="A053">A053</option>
                                <option value="A054">A054</option>
                                <option value="A058">A058</option>
                                <option value="A111">A111</option>
                                <option value="A113">A113</option>
                                <option value="A114">A114</option>
                                <option value="A124">A124</option>
                                <option value="A125">A125</option>
                                <option value="A126">A126</option>
                                <option value="A132">A132</option>
                                <option value="A133">A133</option>
                                <option value="A136">A136</option>
                                <option value="A137">A137</option>
                                <option value="A153">A153</option>
                                <option value="A154">A154</option>
                                <option value="A155">A155</option>
                                <option value="A158">A158</option>
                                <option value="A211">A211</option>
                                <option value="A213">A213</option>
                                <option value="A214">A214</option>
                                <option value="A216">A216</option>
                                <option value="A224">A224</option>
                                <option value="A226">A226</option>
                                <option value="A232">A232</option>
                                <option value="A233">A233</option>
                                <option value="A236">A236</option>
                                <option value="A237">A237</option>
                                <option value="B022">B022</option>
                                <option value="B023">B023</option>
                                <option value="B110">B110</option>
                                <option value="B111">B111</option>
                                <option value="B114">B114</option>
                                <option value="B118">B118</option>
                                <option value="B119">B119</option>
                                <option value="B120">B120</option>
                                <option value="B130">B130</option>
                                <option value="B210">B210</option>
                                <option value="B211">B211</option>
                                <option value="B218">B218</option>
                                <option value="B219">B219</option>
                                <option value="B220">B220</option>
                                <option value="B221">B221</option>
                                <option value="B230">B230</option>
                                <option value="C001">C001</option>
                                <option value="D001">D001</option>
                                <option value="D004">D004</option>
                                <option value="D005">D005</option>
                                <option value="D006">D006</option>
                                <option value="F001">F001</option>
                                <option value="F002">F002</option>
                                <option value="F003">F003</option>
                                <option value="F004">F004</option>
                            </select>
                            <br>
                            <ul>
                                Buchstaben der jeweiligen Gebäude:
                                <li>A: Hauptgebäude</li>
                                <li>B: Außenstelle</li>
                                <li>C: Sporthalle - Außenstelle</li>
                                <li>D: Container - Hauptstelle</li>
                                <li>F: Container - Außenstelle</li>
                            </ul>
                            <hr>
                            <p text-align="center">Gegenstand*:</p>
                            <input type="hidden" name="wichtig" value="bei der unteren liste; erste nummer: kabeln, zweite nummer: lampen, dritte nummer: steckdosen, vierte nummer: stühle, fünfte nummer: tische" readonly>
                            <div class="checkbox-container">
                                <label for="objekt1">Beamer</label><br>
                                <input type="checkbox" id="objekt1" name="objekt" value="Beamer">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt2">Boden</label><br>
                                <input type="checkbox" id="objekt2" name="objekt" value="Boden">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt3">Decke</label><br>
                                <input type="checkbox" id="objekt3" name="objekt" value="Decke">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt4">Fenster</label><br>
                                <input type="checkbox" id="objekt4" name="objekt" value="Fenster">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt5">Papiertuchspender</label><br>
                                <input type="checkbox" id="objekt5" name="objekt" value="Papiertuchspender">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt6">Heizung</label><br>
                                <input type="checkbox" id="objekt6" name="objekt" value="Heizung">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt7">Kabel (wie viele?)</label><br>
                                <input type="number" id="objekt7" name="objekt" value="0" min="0">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt8">Lampe (wie viele?)</label><br>
                                <input type="number" id="objekt8" name="objekt" value="0" min="0">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt9">Lautsprecher</label><br>
                                <input type="checkbox" id="objekt9" name="objekt" value="Lautsprecher">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt10">Mülleimer</label><br>
                                <input type="checkbox" id="objekt10" name="objekt" value="Mülleimer">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt11">Steckdose (wie viele?)</label><br>
                                <input type="number" id="objekt11" name="objekt" value="0" min="0">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt12">Seifenspender</label><br>
                                <input type="checkbox" id="objekt12" name="objekt" value="Seifenspender">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt13">Smartboard</label><br>
                                <input type="checkbox" id="objekt13" name="objekt" value="Smartboard">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt14">Stuhl (wie viele?)</label><br>
                                <input type="number" id="objekt14" name="objekt" value="0" min="0">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt15">Tafel</label><br>
                                <input type="checkbox" id="objekt15" name="objekt" value="Tafel" min="0">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt16">Tisch (wie viele?)</label><br>
                                <input type="number" id="objekt16" name="objekt" value="0" min="0">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt17">Tür</label><br>
                                <input type="checkbox" id="objekt17" name="objekt" value="Tür">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt18">Uhr</label><br>
                                <input type="checkbox" id="objekt18" name="objekt" value="Uhr">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt19">Vorhang</label><br>
                                <input type="checkbox" id="objekt19" name="objekt" value="Vorhang">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt20">Wand</label><br>
                                <input type="checkbox" id="objekt20" name="objekt" value="Wand">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt21">Waschbecken</label><br>
                                <input type="checkbox" id="objekt21" name="objekt" value="Waschbecken">
                            </div>
                            <div class="checkbox-container">
                                <label for="objekt22">Whiteboard</label><br>
                                <input type="checkbox" id="objekt22" name="objekt" value="Whiteboard">
                            </div>
                            <hr>
                            <p>Problem*:</p>
                            <div class="checkbox-container">
                                <label for="idproblem1">Fehlt</label><br>
                                <input type="radio" id="idproblem1" name="problem" value="fehlend">
                            </div>
                            <div class="checkbox-container">
                                <label for="idproblem2">Kaputt</label><br>
                                <input type="radio" id="idproblem2" name="problem" value="kaputt">
                            </div>
                            <div class="checkbox-container">
                                <label for="idproblem3">Sonstiges</label><br>
                                <input type="radio" id="idproblem3" name="problem" value="sonstiges"><br>
                                <input type="text" id="idproblem3text" name="sonstigesproblemtext" placeholder="Problem beschreiben">
                            </div>
                            <hr>
                            <label for="anmerkungen">Anmerkungen:</label>
                            <textarea id="anmerkungen" name="anmerkungen" placeholder="Anmerkungen eingeben" rows="4" cols="50" class="detailstextbox"></textarea>
                            <hr>
                            <label for="dringlichkeit">Dringlichkeit (1-10)*:</label>
                            <input type="range" id="dringlichkeit" name="dringlichkeit" min="1" max="10" step="1" value="1" required>
                            <hr>
                            <label for="email">E-Mail (muss ...@wilhelm-gym.net sein)*:</label>
                            <input type="email" id="email" name="email" pattern="[a-z0-9._%+\-]+(@wilhelm-gym.net)" placeholder="E-Mail eingeben" required>
                            <hr>
                            <button id="senden">Senden</button>
                        </form>
                </article>
        </section>
    </div>
</body>
</html>
